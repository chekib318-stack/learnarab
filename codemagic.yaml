workflows:
  android-workflow:
    name: Arabia Edu - Android APK
    max_build_duration: 60
    working_directory: arabia_edu
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze || true
      - name: Build APK (release)
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/**/*.apk
      - build/app/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - chekib318@gmail.com
        notify:
          success: true
          failure: true
